# Trading universe, grouped by exchange. Codes must exist in
# quantpulse.data.calendar.EXCHANGES; the loader rejects typos at sync time.
# Edit freely; the ingestion pipeline picks this up on its next run.
#
# Each market's benchmark ETF must appear here, or fct_portfolio_vs_benchmark has
# nothing to compare that market's book against.
exchanges:
  XNYS:
    etfs:
      - SPY
      - QQQ
      - IWM
      - DIA
      - XLF
      - XLK
      - XLE
      - XLV
      - GLD
      - TLT
    stocks:
      - AAPL
      - MSFT
      - AMZN
      - GOOGL
      - META
      - NVDA
      - TSLA
      - AVGO
      - BRK-B
      - JPM
      - V
      - MA
      - UNH
      - JNJ
      - PG
      - KO
      - PEP
      - COST
      - WMT
      - HD
      - MCD
      - DIS
      - NFLX
      - AMD
      - INTC
      - CRM
      - ORCL
      - ADBE
      - CSCO
      - XOM
      - CVX
      - BAC
      - WFC
      - GS
      - CAT
      - BA
      - GE
      - UPS
      - T
      - VZ

  # JSE Top 40 constituents with usable history. AMS.JO and NHM.JO are omitted:
  # Yahoo returns no price data for them. Quotes are in ZAc (cents), which the
  # model is indifferent to (every feature is a ratio) but the UI divides by 100.
