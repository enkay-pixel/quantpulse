name: quantpulse

x-app-env: &app-env
  DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-quantpulse}:${POSTGRES_PASSWORD:-quantpulse}@postgres:5432/${POSTGRES_DB:-market}
  DAGSTER_PG_URL: postgresql://${POSTGRES_USER:-quantpulse}:${POSTGRES_PASSWORD:-quantpulse}@postgres:5432/dagster
  MLFLOW_TRACKING_URI: http://mlflow:5000
  QUANTPULSE_UNIVERSE_FILE: /app/configs/universe.yaml

x-dagster-service: &dagster-service
  build:
    context: .
    dockerfile: docker/dagster.Dockerfile
  image: quantpulse-dagster
  environment: *app-env
  depends_on:
    postgres:
      condition: service_healthy
    mlflow:
      condition: service_started
  restart: unless-stopped

services:
  postgres:
    image: postgres:17-alpine
    container_name: quantpulse-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-quantpulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quantpulse}
      POSTGRES_DB: ${POSTGRES_DB:-market}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-quantpulse} -d ${POSTGRES_DB:-market}"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

  mlflow:
    build:
      context: .
      dockerfile: docker/mlflow.Dockerfile
    image: quantpulse-mlflow
    container_name: quantpulse-mlflow
    environment:
      MLFLOW_BACKEND_URI: postgresql+psycopg2://${POSTGRES_USER:-quantpulse}:${POSTGRES_PASSWORD:-quantpulse}@postgres:5432/mlflow
      # The 3.x job-execution subsystem spawns a worker pool ~1 min after boot and
      # OOMs small containers; this platform doesn't use server-side jobs.
      MLFLOW_SERVER_ENABLE_JOB_EXECUTION: "false"
    ports:
      # 5001 on the host: macOS AirPlay Receiver squats on 5000
      - "5001:5000"
    volumes:
      - mlflow-artifacts:/mlartifacts
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health', timeout=3)\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped

  dagster-webserver:
    <<: *dagster-service
    container_name: quantpulse-dagster-web
    command: ["dagster-webserver", "-w", "/opt/dagster/workspace.yaml", "-h", "0.0.0.0", "-p", "3000"]
    ports:
      - "3000:3000"
    deploy:
      resources:
        limits:
          memory: 768M

  dagster-daemon:
    <<: *dagster-service
    container_name: quantpulse-dagster-daemon
    command: ["dagster-daemon", "run", "-w", "/opt/dagster/workspace.yaml"]
    deploy:
      resources:
        limits:
          memory: 1536M  # runs execute in-process under the daemon's launcher

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    image: quantpulse-api
    container_name: quantpulse-api
    environment: *app-env
    command:
      ["uvicorn", "quantpulse.api.app:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 384M
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    image: quantpulse-web
    container_name: quantpulse-web
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
    restart: unless-stopped

volumes:
  postgres-data:
  mlflow-artifacts:
