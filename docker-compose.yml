name: quantpulse

services:
  postgres:
    image: postgres:17-alpine
    container_name: quantpulse-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-quantpulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quantpulse}
      POSTGRES_DB: ${POSTGRES_DB:-market}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-quantpulse} -d ${POSTGRES_DB:-market}"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

  # Added in M3: dagster-webserver, dagster-daemon, dagster-code, mlflow
  # Added in M4/M5: api, web

volumes:
  postgres-data:
