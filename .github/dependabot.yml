version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      python-deps:
        patterns: ["*"]

  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "weekly"
    groups:
      js-deps:
        patterns: ["*"]
    ignore:
      # Majors deferred until their ecosystems align / a deliberate migration:
      # typescript 7 conflicts with typescript-eslint 8's peer range, eslint 10
      # needs typescript-eslint support, recharts 3 changes the chart API.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@eslint/js"
        update-types: ["version-update:semver-major"]
      - dependency-name: "recharts"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"

  - package-ecosystem: "docker"
    directory: "/docker"
    schedule:
      interval: "monthly"
    ignore:
      # Verified 2026-07-23 by building the image, not assumed: python:3.14-slim fails
      # at `dbt parse` with mashumaro UnserializableField on dbt-common's dataclass
      # schema — 3.14's deferred annotations (PEP 649) break its field introspection.
      # The API image builds fine; the dagster one cannot. Revisit when dbt-common
      # supports 3.14, then drop this rule.
      - dependency-name: "python"
        update-types: ["version-update:semver-major"]
