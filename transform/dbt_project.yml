name: quantpulse
version: "1.0.0"
profile: quantpulse

vars:
  # Annualized risk-free rate used for CAPM excess returns (fct_alpha_beta).
  risk_free_rate: 0.04
  # Buy-and-hold comparison ticker per market. Must mirror Exchange.benchmark in
  # quantpulse.data.calendar — a unit test asserts they agree, because two sources of
  # truth for the same fact drift silently.
  benchmarks:
    XNYS: SPY
    XJSE: STX40.JO
  # Ratios (Sharpe, information ratio, win rate, beta) are meaningless on a handful of
  # days: two days of returns annualize to a confident-looking number that is pure noise.
  # Marts null them below this, so every consumer gets the same answer rather than each
  # re-implementing the guard. Mirrors reporting.MIN_DAYS_FOR_RATIOS; a test asserts it.
  min_days_for_ratios: 20

model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]

target-path: target
clean-targets: ["target", "dbt_packages"]

models:
  quantpulse:
    staging:
      +materialized: view
      +docs:
        node_color: "#86b6ef"
    marts:
      +materialized: table
      +docs:
        node_color: "#2a78d6"
