version: 2

models:
  - name: fct_daily_returns
    description: Per-(ticker, date) simple returns with 21-day rolling volatility and mean.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [ticker, date]
    columns:
      - name: ticker
        tests: [not_null]
      - name: date
        tests: [not_null]
      - name: close
        description: Adjusted close.
        tests: [not_null]

  - name: fct_signal_performance
    description: >
      Signal-quintile forward performance: per date, predictions are bucketed into
      quintiles (1 = strongest signal) and paired with the next trading day's realized
      return. The monotonicity of avg_next_day_return across quintiles is the
      plainest read of whether the model ranks stocks usefully.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [date, signal_quintile]
    columns:
      - name: signal_quintile
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [1, 2, 3, 4, 5]
                quote: false
      - name: n_tickers
        tests: [not_null]

  - name: fct_portfolio_daily
    description: Paper portfolio with cumulative return and running drawdown.
    columns:
      - name: date
        tests: [unique, not_null]
      - name: drawdown
        description: Running peak-to-current drawdown (always <= 0).
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "<= 0.0000001"

  - name: dim_universe
    description: Universe members with price-coverage metadata.
    columns:
      - name: ticker
        tests: [unique, not_null]
      - name: asset_type
        tests:
          - accepted_values:
              arguments:
                values: ["stock", "etf"]
