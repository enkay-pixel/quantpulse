version: 2

models:
  - name: fct_daily_returns
    description: Per-(ticker, date) simple returns with 21-day rolling volatility and mean.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [ticker, date]
    columns:
      - name: exchange
        tests: [not_null]
      - name: ticker
        tests: [not_null]
      - name: date
        tests: [not_null]
      - name: close
        description: Adjusted close.
        tests: [not_null]

  - name: fct_signal_performance
    description: >
      Signal-quintile forward performance: per date, predictions are bucketed into
      quintiles (1 = strongest signal) and paired with the next trading day's realized
      return. The monotonicity of avg_next_day_return across quintiles is the
      plainest read of whether the model ranks stocks usefully.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [date, exchange, signal_quintile]
    columns:
      - name: signal_quintile
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [1, 2, 3, 4, 5]
                quote: false
      - name: n_tickers
        tests: [not_null]

  - name: fct_portfolio_daily
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [date, exchange]
    description: >
      Paper portfolio with cumulative return, running drawdown, rolling Sharpe, and
      the evidence phase: 'replay' before the first champion promotion (in-sample),
      'live' after (true out-of-sample).
    columns:
      - name: date
        tests: [not_null]
      - name: exchange
        tests: [not_null]
      - name: drawdown
        description: Running peak-to-current drawdown (always <= 0).
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "<= 0.0000001"
      - name: phase
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["replay", "live"]

  - name: fct_portfolio_vs_benchmark
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [date, exchange]
    description: Strategy equity vs SPY buy-and-hold indexed to the portfolio's first date.
    columns:
      - name: date
        tests: [not_null]
      - name: exchange
        tests: [not_null]
      - name: portfolio_equity
        tests: [not_null]
      - name: benchmark_equity
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"

  - name: fct_track_record
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [exchange, phase]
    description: >
      Per-phase performance summary. The 'live' row is the strategy's honest
      out-of-sample record; the 'replay' row is labeled in-sample history.
    columns:
      - name: phase
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["replay", "live"]
      - name: n_days
        tests: [not_null]
      - name: win_rate
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 1"

  - name: fct_alpha_beta
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [exchange, phase]
    description: >
      CAPM decomposition vs SPY per evidence phase: beta (market exposure — a
      market-neutral book should sit near 0), annualized alpha (return earned
      independently of the market), R², tracking error, and information ratio. This is
      the fair read on a long/short strategy; raw return vs SPY is not.
    columns:
      - name: phase
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["replay", "live"]
      - name: n_days
        tests: [not_null]

  - name: fct_option_summary
    description: >
      Per-(ticker, snapshot) option-market read: ATM implied volatility and the
      put/call open-interest ratio. Accumulates history as snapshots run.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [ticker, snapshot_date]
    columns:
      - name: atm_iv
        tests: [not_null]
      - name: put_call_ratio
        description: Put OI / call OI (>1 = more put positioning).

  - name: fct_iv_surface
    description: Mean IV by expiry and moneyness bucket — the volatility smile/skew and term structure.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [ticker, snapshot_date, expiry, option_type, moneyness_bucket]
    columns:
      - name: avg_iv
        tests: [not_null]

  - name: dim_universe
    description: Universe members with price-coverage metadata.
    columns:
      - name: ticker
        tests: [unique, not_null]
      - name: asset_type
        tests:
          - accepted_values:
              arguments:
                values: ["stock", "etf"]
