version: 2

sources:
  - name: market
    description: Raw platform tables owned by the ingestion and ML pipelines (Alembic-managed).
    database: "{{ env_var('POSTGRES_DB', 'market') }}"
    schema: public
    tables:
      - name: prices
        description: Daily OHLCV bars per ticker (yfinance with Stooq fallback), idempotent upserts.
        meta:
          dagster:
            asset_key: raw_prices
        loaded_at_field: ingested_at
        freshness:
          warn_after: {count: 4, period: day}
          error_after: {count: 8, period: day}
        columns:
          - name: ticker
            tests: [not_null]
          - name: close
            tests: [not_null]
      - name: universe
        description: Configured trading universe with active flags.
        columns:
          - name: ticker
            tests: [unique, not_null]
      - name: predictions
        description: Champion-model forward-return scores per (ticker, date, model_version).
        meta:
          dagster:
            asset_key: predictions
      - name: portfolio_snapshots
        description: >
          Simulated long/short paper books, one row per trading day per book. Several
          constructions (see quantpulse.ml.portfolio.BOOKS) run over the same
          predictions and differ only in rebalance frequency, so the grain is
          (date, variant) — the staging model pins the live daily book.
        meta:
          dagster:
            asset_key: portfolio_equity
        tests:
          - dbt_utils.unique_combination_of_columns:
              arguments:
                combination_of_columns: [date, variant]
        columns:
          - name: date
            tests: [not_null]
          - name: variant
            tests: [not_null]
      - name: model_runs
        description: Training/promotion audit log written by the self-adapting loop.
        meta:
          dagster:
            asset_key: champion_model
        columns:
          - name: id
            tests: [unique, not_null]
      - name: option_quotes
        description: Daily live option-chain snapshots with Black-Scholes Greeks.
        meta:
          dagster:
            asset_key: option_chains
