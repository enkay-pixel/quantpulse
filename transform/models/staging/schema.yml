version: 2

models:
  - name: stg_prices
    description: 1:1 view over raw daily bars.
    columns:
      - name: close
        tests: [not_null]

  - name: stg_universe
    description: 1:1 view over the configured universe.
    columns:
      - name: ticker
        tests: [unique, not_null]

  - name: stg_predictions
    description: One score per (ticker, date) — newest model version wins.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [ticker, date]

  - name: stg_portfolio_snapshots
    description: >
      The live daily book per market. Variant is pinned; exchange is not, so the grain is
      (date, exchange) — one row per market per trading day.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [date, exchange]
    columns:
      - name: date
        tests: [not_null]
      - name: exchange
        tests: [not_null]

  - name: stg_model_runs
    description: 1:1 view over the training/promotion audit log.
    columns:
      - name: id
        tests: [unique, not_null]

  - name: stg_option_quotes
    description: Option-chain snapshots with moneyness and days-to-expiry derived.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [snapshot_date, ticker, expiry, strike, option_type]
    columns:
      - name: implied_volatility
        tests: [not_null]
      - name: option_type
        tests:
          - accepted_values:
              arguments:
                values: ["call", "put"]
